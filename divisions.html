<!doctype html>

<head>

  <title>PPM AFM</title>

  <!-- Favicons -->
  <link href="assets/img/logo-ppm.png" rel="icon" sizes="128x128">

  <!-- Bootstrap & Third Parties CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" media="print"
    onload="this.media='all'">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"
    media="print" onload="this.media='all'">

  <!-- Lightbox2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/lightbox2@2.11.3/dist/css/lightbox.min.css" rel="stylesheet" media="print"
    onload="this.media='all'">

  <!-- Fancybox CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css" media="print"
    onload="this.media='all'" />

  <!-- Main CSS -->
  <link href="assets/style.css" rel="stylesheet" media="print" onload="this.media='all'">

  <!-- Sumber Font Website PPM -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

<body data-bs-spy="scroll" data-bs-target="#navbar-example">

          </div>

  <!-- Footer PPM -->
  <div id="footer-ppm"></div>


  <!-- JavaScript -->
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Jquery JS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Lightbox2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/lightbox2@2.11.3/dist/js/lightbox.min.js"></script>

  <!-- Fancybox JS -->
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

  <!-- Untuk layout album Masonry JS -->
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

  <!-- ImagesLoaded -->
  <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

  <!-- Main JS -->
  <script src="assets/main.js"></script>

  <script>
    // Masonry setelah semua terload baru di inisialisasi
    const $grid = $('.row[data-masonry]');
    $grid.imagesLoaded(function () {
      $grid.masonry({
        itemSelector: '.col-sm-6', // karena kamu pakai grid ini
        percentPosition: true
      });
    });
  </script>
